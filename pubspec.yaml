name: algo_canvas
description: An open-source algorithm visualizer for learning.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
  web:
    generate: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#673AB7"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter_native_splash:
  color: "#673AB7"
  color_dark: "#673AB7"
  image: "assets/app_icon.png"
  image_dark: "assets/app_icon.png"
  android: true
  ios: true
  web: true
  android_12:
    color: "#673AB7"
    color_dark: "#673AB7"

flutter:
  uses-material-design: true
